site_name: Matyan
site_description: Experiment tracking and ML observability — Aim-compatible UI and SDK with a scalable backend.
site_url: https://4gt-104.github.io/matyan-core/
repo_url: https://github.com/4gt-104/matyan-core

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.footer

plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          paths: [extra/matyan-client/src, extra/matyan-backend/src]
          options:
            docstring_style: sphinx
            show_source: false

markdown_extensions:
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/4gt-104/matyan-core

extra_css:
  - stylesheets/extra.css


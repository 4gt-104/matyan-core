# Matyan: infrastructure + application services
#
# All services run in Docker's default bridge network.
# Port-forwarding exposes each service to the Linux host:
#
#   FDB        localhost:4500   (fdbcli -C dev/fdb.cluster)
#   Kafka      localhost:9092
#   RustFS     localhost:9000   (S3 API)  /  localhost:9001 (console)
#   Backend    localhost:53800
#   Frontier   localhost:53801
#
# Container-to-container traffic uses Docker service names:
#   kafka:9092, rustfs:9000, fdb-coordinator (via fdb-shared volume)
#
# Usage:
#   docker compose build
#   docker compose up -d
#   docker compose logs -f backend

services:
  # --- Infrastructure ---

  fdb-coordinator:
    image: foundationdb/foundationdb:7.3.69
    # Image defaults handle bridge mode automatically:
    #   FDB_NETWORKING_MODE=container  → PUBLIC_IP = container bridge IP
    #   FDB_CLUSTER_FILE=/var/fdb/fdb.cluster
    #   FDB_PORT=4500
    ports:
      - "4500:4500"
    volumes:
      - fdb-shared:/var/fdb          # coordinator writes fdb.cluster + data here
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/4500"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s

  fdb-init:
    image: foundationdb/foundationdb:7.3.69
    depends_on:
      fdb-coordinator:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        if timeout 10 fdbcli --exec "status" 2>&1 | grep -q "Redundancy mode"; then
          echo "FDB already configured — skipping."
        else
          fdbcli --exec "configure new single memory ; status"
        fi
    restart: "no"
    volumes:
      - fdb-shared:/var/fdb

  kafka:
    image: apache/kafka:4.2.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      CLUSTER_ID: "matyan-dev-kafka-00001"
    healthcheck:
      test:
        [
          "CMD",
          "/opt/kafka/bin/kafka-topics.sh",
          "--bootstrap-server",
          "localhost:9092",
          "--list",
        ]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s

  kafka-init:
    image: apache/kafka:4.2.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic data-ingestion --partitions 6 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic control-events --partitions 1 --replication-factor 1 &&
        echo "Topics created successfully" &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
    restart: "no"

  rustfs-init:
    image: alpine:3.23.3
    volumes:
      - rustfs-data-0:/data0
      - rustfs-data-1:/data1
      - rustfs-data-2:/data2
      - rustfs-data-3:/data3
    command: sh -c "chown -R 10001:10001 /data0 /data1 /data2 /data3"
    restart: "no"

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.89
    ports:
      - "9000:9000"                  # S3 API
      - "9001:9001"                  # web console
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_VOLUMES: /data/rustfs{0...3}
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
    volumes:
      - rustfs-data-0:/data/rustfs0
      - rustfs-data-1:/data/rustfs1
      - rustfs-data-2:/data/rustfs2
      - rustfs-data-3:/data/rustfs3
    depends_on:
      rustfs-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Application ---

  backend:
    image: docker.io/288888/matyan-backend:latest
    build:
      context: ../extra
      dockerfile: matyan-backend/Dockerfile.dev
      platforms:
        - "${DOCKER_PLATFORM}"
    ports:
      - "53800:53800"
    depends_on:
      fdb-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      rustfs:
        condition: service_healthy
    environment:
      FDB_CLUSTER_FILE: /var/fdb/fdb.cluster
      S3_ENDPOINT: http://rustfs:9000
      S3_ACCESS_KEY: rustfsadmin
      S3_SECRET_KEY: rustfsadmin
      S3_BUCKET: matyan-artifacts
      S3_REGION: us-east-1
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8000","http://127.0.0.1:8000","http://localhost:53800"]'
    volumes:
      - fdb-shared:/var/fdb
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:53800/api/v1/rest/projects/')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontier:
    image: docker.io/288888/matyan-frontier:latest
    build:
      context: ../extra
      dockerfile: matyan-frontier/Dockerfile.dev
      platforms:
        - "${DOCKER_PLATFORM}"
    ports:
      - "53801:53801"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      rustfs:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      S3_ENDPOINT: http://rustfs:9000
      S3_ACCESS_KEY: rustfsadmin
      S3_SECRET_KEY: rustfsadmin
      S3_BUCKET: matyan-artifacts
      S3_REGION: us-east-1
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:53801/docs')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ingestion-worker:
    image: docker.io/288888/matyan-backend:latest
    build:
      context: ../extra
      dockerfile: matyan-backend/Dockerfile.dev
      platforms:
        - "${DOCKER_PLATFORM}"
    command: ["matyan-backend", "ingest-worker"]
    depends_on:
      fdb-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      rustfs:
        condition: service_healthy
    environment:
      FDB_CLUSTER_FILE: /var/fdb/fdb.cluster
      S3_ENDPOINT: http://rustfs:9000
      S3_ACCESS_KEY: rustfsadmin
      S3_SECRET_KEY: rustfsadmin
      S3_BUCKET: matyan-artifacts
      S3_REGION: us-east-1
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      METRICS_PORT: "9101"
    volumes:
      - fdb-shared:/var/fdb
    restart: unless-stopped

  control-worker:
    image: docker.io/288888/matyan-backend:latest
    build:
      context: ../extra
      dockerfile: matyan-backend/Dockerfile.dev
      platforms:
        - "${DOCKER_PLATFORM}"
    command: ["matyan-backend", "control-worker"]
    depends_on:
      fdb-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      rustfs:
        condition: service_healthy
    environment:
      FDB_CLUSTER_FILE: /var/fdb/fdb.cluster
      S3_ENDPOINT: http://rustfs:9000
      S3_ACCESS_KEY: rustfsadmin
      S3_SECRET_KEY: rustfsadmin
      S3_BUCKET: matyan-artifacts
      S3_REGION: us-east-1
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      METRICS_PORT: "9102"
    volumes:
      - fdb-shared:/var/fdb
    restart: unless-stopped

  ui:
    image: docker.io/288888/matyan-ui:latest
    build:
      context: ../extra
      dockerfile: matyan-ui/Dockerfile.dev
      platforms:
        - "${DOCKER_PLATFORM}"
    ports:
      - "8000:8000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      MATYAN_UI_BASE_PATH: ""
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  fdb-shared:
  rustfs-data-0:
  rustfs-data-1:
  rustfs-data-2:
  rustfs-data-3:

suite: Credential injection — existingSecret patterns for all services

templates:
  - templates/backend-deployment.yaml
  - templates/frontier-deployment.yaml
  - templates/ingestion-worker-deployment.yaml
  - templates/control-worker-deployment.yaml
  - templates/ui-deployment.yaml

tests:

# ---------------------------------------------------------------------------
# Blob URI secret (backend only)
# ---------------------------------------------------------------------------

  - it: BLOB_URI_SECRET uses secretKeyRef when blobUriSecret.existingSecret is set
    values:
      - fixtures/base.yaml
    set:
      blobUriSecret.existingSecret: "my-blob-secret"
      blobUriSecret.key: "blob-uri-secret"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="BLOB_URI_SECRET")].valueFrom.secretKeyRef.name
          value: "my-blob-secret"
        template: templates/backend-deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="BLOB_URI_SECRET")].valueFrom.secretKeyRef.key
          value: "blob-uri-secret"
        template: templates/backend-deployment.yaml
      - isNull:
          path: spec.template.spec.containers[0].env[?(@.name=="BLOB_URI_SECRET")].value
        template: templates/backend-deployment.yaml

  - it: BLOB_URI_SECRET uses plain value when blobUriSecret.value is set and no existingSecret
    values:
      - fixtures/base.yaml
    set:
      blobUriSecret.existingSecret: ""
      blobUriSecret.value: "abc123fernet"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="BLOB_URI_SECRET")].value
          value: "abc123fernet"
        template: templates/backend-deployment.yaml
      - isNull:
          path: spec.template.spec.containers[0].env[?(@.name=="BLOB_URI_SECRET")].valueFrom
        template: templates/backend-deployment.yaml

  - it: BLOB_URI_SECRET is absent from env when neither existingSecret nor value is set
    values:
      - fixtures/base.yaml
    set:
      blobUriSecret.existingSecret: ""
      blobUriSecret.value: ""
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: BLOB_URI_SECRET
          any: true
        template: templates/backend-deployment.yaml

  - it: existingSecret takes precedence over plaintext value for blob URI secret
    values:
      - fixtures/base.yaml
    set:
      blobUriSecret.existingSecret: "secret-wins"
      blobUriSecret.key: "blob-uri-secret"
      blobUriSecret.value: "plaintext-should-be-ignored"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="BLOB_URI_SECRET")].valueFrom.secretKeyRef.name
          value: "secret-wins"
        template: templates/backend-deployment.yaml
      - isNull:
          path: spec.template.spec.containers[0].env[?(@.name=="BLOB_URI_SECRET")].value
        template: templates/backend-deployment.yaml

# ---------------------------------------------------------------------------
# UI API auth token (ui-deployment only)
# ---------------------------------------------------------------------------

  - it: MATYAN_UI_API_AUTH_TOKEN uses secretKeyRef when apiAuthTokenSecret is set
    values:
      - fixtures/base.yaml
    set:
      ui.apiAuthTokenSecret: "my-auth-secret"
      ui.apiAuthTokenKey: "api-auth-token"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="MATYAN_UI_API_AUTH_TOKEN")].valueFrom.secretKeyRef.name
          value: "my-auth-secret"
        template: templates/ui-deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="MATYAN_UI_API_AUTH_TOKEN")].valueFrom.secretKeyRef.key
          value: "api-auth-token"
        template: templates/ui-deployment.yaml
      - isNull:
          path: spec.template.spec.containers[0].env[?(@.name=="MATYAN_UI_API_AUTH_TOKEN")].value
        template: templates/ui-deployment.yaml

  - it: MATYAN_UI_API_AUTH_TOKEN uses plain value when apiAuthToken is set and no secret
    values:
      - fixtures/base.yaml
    set:
      ui.apiAuthTokenSecret: ""
      ui.apiAuthToken: "my-static-token"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="MATYAN_UI_API_AUTH_TOKEN")].value
          value: "my-static-token"
        template: templates/ui-deployment.yaml
      - isNull:
          path: spec.template.spec.containers[0].env[?(@.name=="MATYAN_UI_API_AUTH_TOKEN")].valueFrom
        template: templates/ui-deployment.yaml

  - it: MATYAN_UI_API_AUTH_TOKEN is absent from env when neither secret nor token is set
    values:
      - fixtures/base.yaml
    set:
      ui.apiAuthTokenSecret: ""
      ui.apiAuthToken: ""
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: MATYAN_UI_API_AUTH_TOKEN
          any: true
        template: templates/ui-deployment.yaml

  - it: apiAuthTokenSecret takes precedence over plaintext apiAuthToken
    values:
      - fixtures/base.yaml
    set:
      ui.apiAuthTokenSecret: "secret-wins"
      ui.apiAuthToken: "plaintext-should-be-ignored"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="MATYAN_UI_API_AUTH_TOKEN")].valueFrom.secretKeyRef.name
          value: "secret-wins"
        template: templates/ui-deployment.yaml
      - isNull:
          path: spec.template.spec.containers[0].env[?(@.name=="MATYAN_UI_API_AUTH_TOKEN")].value
        template: templates/ui-deployment.yaml

# ---------------------------------------------------------------------------
# Kafka SASL credentials — backend, frontier, and workers
# ---------------------------------------------------------------------------

  - it: KAFKA_SASL_USERNAME and PASSWORD use secretKeyRef when kafkaClient.existingSecret is set
    values:
      - fixtures/base.yaml
    set:
      kafkaClient.existingSecret: "kafka-creds"
      kafkaClient.saslUsernameKey: "sasl-username"
      kafkaClient.saslPasswordKey: "sasl-password"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="KAFKA_SASL_USERNAME")].valueFrom.secretKeyRef.name
          value: "kafka-creds"
        template: templates/backend-deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="KAFKA_SASL_USERNAME")].valueFrom.secretKeyRef.key
          value: "sasl-username"
        template: templates/backend-deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="KAFKA_SASL_PASSWORD")].valueFrom.secretKeyRef.name
          value: "kafka-creds"
        template: templates/backend-deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="KAFKA_SASL_PASSWORD")].valueFrom.secretKeyRef.key
          value: "sasl-password"
        template: templates/backend-deployment.yaml

  - it: Kafka SASL existingSecret is also applied to frontier
    values:
      - fixtures/base.yaml
    set:
      kafkaClient.existingSecret: "kafka-creds"
      kafkaClient.saslUsernameKey: "sasl-username"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="KAFKA_SASL_USERNAME")].valueFrom.secretKeyRef.name
          value: "kafka-creds"
        template: templates/frontier-deployment.yaml

  - it: Kafka SASL existingSecret is applied to ingestion-worker
    values:
      - fixtures/base.yaml
    set:
      kafkaClient.existingSecret: "kafka-creds"
      kafkaClient.saslUsernameKey: "sasl-username"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="KAFKA_SASL_USERNAME")].valueFrom.secretKeyRef.name
          value: "kafka-creds"
        template: templates/ingestion-worker-deployment.yaml

  - it: KAFKA_SASL_USERNAME uses plain value when kafkaClient.saslUsername is set
    values:
      - fixtures/base.yaml
    set:
      kafkaClient.existingSecret: ""
      kafkaClient.saslUsername: "myuser"
      kafkaClient.saslPassword: "mypass"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="KAFKA_SASL_USERNAME")].value
          value: "myuser"
        template: templates/backend-deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="KAFKA_SASL_PASSWORD")].value
          value: "mypass"
        template: templates/backend-deployment.yaml

  - it: KAFKA_SASL_USERNAME and PASSWORD are absent when no credentials are configured
    values:
      - fixtures/base.yaml
    set:
      kafkaClient.existingSecret: ""
      kafkaClient.saslUsername: ""
      kafkaClient.saslPassword: ""
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: KAFKA_SASL_USERNAME
          any: true
        template: templates/backend-deployment.yaml
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: KAFKA_SASL_PASSWORD
          any: true
        template: templates/backend-deployment.yaml

  - it: kafkaClient.existingSecret overrides plaintext saslUsername and saslPassword
    values:
      - fixtures/base.yaml
    set:
      kafkaClient.existingSecret: "secret-wins"
      kafkaClient.saslUsernameKey: "sasl-username"
      kafkaClient.saslUsername: "ignored-user"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="KAFKA_SASL_USERNAME")].valueFrom.secretKeyRef.name
          value: "secret-wins"
        template: templates/backend-deployment.yaml
      - isNull:
          path: spec.template.spec.containers[0].env[?(@.name=="KAFKA_SASL_USERNAME")].value
        template: templates/backend-deployment.yaml

# ---------------------------------------------------------------------------
# S3 existingSecret — applied to both backend and frontier
# (core logic tested in s3_test.yaml; here we verify propagation across services)
# ---------------------------------------------------------------------------

  - it: s3 existingSecret is propagated to control-worker
    values:
      - fixtures/base.yaml
    set:
      s3.existingSecret: "my-s3-secret"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="S3_ACCESS_KEY")].valueFrom.secretKeyRef.name
          value: "my-s3-secret"
        template: templates/control-worker-deployment.yaml

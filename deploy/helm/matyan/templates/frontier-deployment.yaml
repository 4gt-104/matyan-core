apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "matyan.fullname" . }}-frontier
  labels:
    {{- include "matyan.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontier
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.frontier.replicaCount }}
  selector:
    matchLabels:
      {{- include "matyan.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontier
  template:
    metadata:
      labels:
        {{- include "matyan.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontier
        {{- with .Values.frontier.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.frontier.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.kafka.waitForReady.enabled }}
      initContainers:
        - name: wait-for-kafka
          image: "{{ .Values.kafka.waitForReady.image.repository }}:{{ .Values.kafka.waitForReady.image.tag }}"
          imagePullPolicy: {{ .Values.kafka.waitForReady.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -e
              BOOTSTRAP="{{ include "matyan.kafkaBootstrapServers" . }}"
              TIMEOUT={{ .Values.kafka.waitForReady.timeoutSeconds }}
              START=$(date +%s)
              until /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server "${BOOTSTRAP}" --list >/dev/null 2>&1; do
                now=$(date +%s)
                if [ $((now - START)) -ge "${TIMEOUT}" ]; then
                  echo "Timeout waiting for Kafka at ${BOOTSTRAP}"
                  exit 1
                fi
                echo "Waiting for Kafka to be ready... (${BOOTSTRAP} is not available yet)"
                sleep 3
              done
      {{- end }}
      containers:
        - name: frontier
          image: "{{ .Values.frontier.image.repository }}:{{ .Values.frontier.image.tag }}"
          imagePullPolicy: {{ .Values.frontier.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontier.service.port }}
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: {{ .Values.frontier.logLevel | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ include "matyan.kafkaBootstrapServers" . | quote }}
            - name: KAFKA_DATA_INGESTION_TOPIC
              value: {{ .Values.kafka.dataIngestionTopic | quote }}
            {{- with include "matyan.kafkaSecurityProtocol" . }}
            - name: KAFKA_SECURITY_PROTOCOL
              value: {{ . | quote }}
            {{- end }}
            {{- with include "matyan.kafkaSaslMechanism" . }}
            - name: KAFKA_SASL_MECHANISM
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.kafkaClient.existingSecret }}
            - name: KAFKA_SASL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kafkaClient.existingSecret }}
                  key: {{ .Values.kafkaClient.saslUsernameKey }}
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kafkaClient.existingSecret }}
                  key: {{ .Values.kafkaClient.saslPasswordKey }}
            {{- else }}
            {{- if .Values.kafkaClient.saslUsername }}
            - name: KAFKA_SASL_USERNAME
              value: {{ .Values.kafkaClient.saslUsername | quote }}
            {{- end }}
            {{- if .Values.kafkaClient.saslPassword }}
            - name: KAFKA_SASL_PASSWORD
              value: {{ .Values.kafkaClient.saslPassword | quote }}
            {{- end }}
            {{- end }}
            - name: S3_ENDPOINT
              value: {{ include "matyan.s3Endpoint" . | quote }}
            - name: S3_PUBLIC_ENDPOINT
              value: {{ include "matyan.s3PublicEndpoint" . | quote }}
            - name: S3_BUCKET
              value: {{ .Values.s3.bucket | quote }}
            - name: S3_PRESIGN_EXPIRY
              value: {{ .Values.s3.presignExpiry | quote }}
            {{- if .Values.s3.existingSecret }}
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.existingSecret }}
                  key: {{ .Values.s3.accessKeyKey | default "s3-access-key" }}
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.existingSecret }}
                  key: {{ .Values.s3.secretKeyKey | default "s3-secret-key" }}
            {{- else }}
            - name: S3_ACCESS_KEY
              value: {{ include "matyan.s3AccessKey" . | quote }}
            - name: S3_SECRET_KEY
              value: {{ include "matyan.s3SecretKey" . | quote }}
            {{- end }}
            {{- with .Values.frontier.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.frontier.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: {{ .Values.frontier.readinessPath | quote }}
              port: http
          livenessProbe:
            httpGet:
              path: {{ .Values.frontier.livenessPath | quote }}
              port: http
          resources:
            {{- toYaml .Values.frontier.resources | nindent 12 }}
      {{- with .Values.frontier.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontier.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontier.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

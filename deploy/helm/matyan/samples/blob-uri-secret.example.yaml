# Sample Secret for blobUriSecret (Fernet key for blob URI encryption).
#
# The backend uses this key to encrypt/decrypt blob URIs in custom object responses.
# Use a pre-existing Secret in production instead of plaintext in values.
#
# 1. Generate a Fernet key:
#    python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#
# 2. Replace the placeholder below with your key (or use stringData with the raw key).
# 3. Apply: kubectl apply -f blob-uri-secret.example.yaml -n <namespace>
# 4. In values: blobUriSecret.existingSecret: "matyan-blob-uri-secret"
#
# Optional: use "kubectl create secret generic matyan-blob-uri-secret --from-literal=blob-uri-secret=<KEY> -n <namespace>"
# and delete this file; the key name must match blobUriSecret.key (default: "blob-uri-secret").
---
apiVersion: v1
kind: Secret
metadata:
  name: matyan-blob-uri-secret
  namespace: matyan
type: Opaque
stringData:
  # Key name must match values.blobUriSecret.key (default: "blob-uri-secret")
  blob-uri-secret: "REPLACE_WITH_FERNET_KEY"  # URL-safe base64, 32 bytes; generate with Fernet.generate_key()

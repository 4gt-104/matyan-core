---
name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: contact
    attributes:
      label: Contact Details (optional)
      description: How can we get in touch with you if we need more info?
      placeholder: youre@example.com
    validations:
      required: false
  - type: textarea
    id: system-information
    attributes:
      label: System / component versions
      description: Output of `matyan-client status` (or backend/frontier/client versions)
      placeholder: Paste the output of `matyan-client status` or describe your environment.
    validations:
      required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see? What did you expect?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: How do you trigger this bug? Please walk us through it step by step.
      value: |
        1.
        2.
        3.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Copy and paste any relevant log output. It will be formatted as code.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Guidelines
      description: By submitting this issue, you agree to follow our [contributing guidelines](docs/contributing.md).
    options:
      - label: I agree to follow this project's contributing guidelines
        required: true
